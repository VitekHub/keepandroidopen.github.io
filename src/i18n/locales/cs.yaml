# Meta

# Hero
hero_lede: "Váš telefon brzy přestane být váš."
hero_countdown_label: "dní do uzamčení"
hero_sub: >-
  Od září 2026 Google bez vašeho souhlasu prosadí tichou aktualizaci, která <strong>zablokuje každou aplikaci pro Android</strong>, jejíž vývojář se neregistroval u Googlu, nepodepsal smlouvu, nezaplatil a neodevzdal úřední doklad totožnosti.
hero_kicker: "Každá aplikace a každé zařízení na celém světě, bez možnosti odmítnutí."

# What Google is doing
what_heading: "Co Google dělá"
what_intro: >-
  V srpnu 2025 Google <a href="https://developer.android.com/developer-verification" target="_blank">oznámil &#8599;</a> novou povinnost: od září 2026 <strong>se musí každý vývojář Android aplikací zaregistrovat centrálně u Googlu</strong>, než bude možné jeho software nainstalovat na jakékoli zařízení. Nejen aplikace z Obchodu Play: všechny aplikace. To zahrnuje aplikace sdílené mezi přáteli, distribuované přes <a href="https://f-droid.org" target="_blank">F-Droid &#8599;</a>, vytvářené nadšenci pro osobní potřebu. Nezávislí vývojáři, církevní a komunitní skupiny i nadšenci tak budou zbaveni možnosti vyvíjet a distribuovat svůj software.
what_registration: "Registrace vyžaduje:"
what_req_fee: "Zaplacení poplatku Googlu"
what_req_terms: "Souhlas s Podmínkami použití Googlu"
what_req_id: "Předložení úředního dokladu totožnosti"
what_req_signing: "Poskytnutí důkazu o vašem soukromém podpisovém klíči"
what_req_appids: "Uvedení všech současných a všech budoucích identifikátorů aplikací"
what_pullquote: "Pokud vývojář nesplní podmínky, jeho aplikace budou tiše zablokovány na všech zařízeních Android na celém světě."

# Who this hurts
impact_heading: "Koho to poškozuje"
impact_you_heading: "Vás"
impact_you_p1: "Koupil jste si telefon s Androidem, protože Google vám slíbil, že je otevřený. Mohl jste si nainstalovat, co jste chtěl, a o tom to celé bylo."
impact_you_p2: >-
  Google nyní zpětně mění podmínky této dohody i u hardwaru, který již vlastníte. Po nasazení této aktualizace budete moci používat pouze software, který Google předem schválil. A to na vašem telefonu: <i>vašem</i> zařízení, za které jste <i>vy</i> zaplatili.
impact_dev_heading: "Nezávislí vývojáři"
impact_dev_p1: "První aplikace teenagera, nástroj na ochranu soukromí od dobrovolníka, nebo interní beta verze firmy. Na tom nezáleží. Od září 2026 nebude možné nic z toho nainstalovat bez souhlasu Googlu."
impact_dev_p2: >-
  <a href="https://f-droid.org" target="_blank">F-Droid &#8599;</a>, domov tisíců svobodných a open-source aplikací pro Android, to označil za <a href="https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html" target="_blank">"existenční" hrozbu &#8599;</a>. Cory Doctorow to nazývá <a href="https://pluralistic.net/2025/09/01/fulu/" target="_blank">"Darth Android" &#8599;</a>.
impact_gov_heading: "Vlády a občanská společnost"
impact_gov_p1: >-
  Google má <a href="https://www.aclu.org/news/free-speech/app-store-oligopoly" target="_blank">prokázanou historii &#8599;</a> toho, že vyhovuje požadavkům autoritářských režimů na odstranění aplikací. Díky tomuto programu bude software, na kterém běží instituce vaší země, záviset na libovůli jediné zahraniční korporace, která se nikomu nezodpovídá.
impact_gov_p2: >-
  <a href="https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship" target="_blank">EFF označuje &#8599;</a> bránění aplikací za "stále se rozšiřující cestu k cenzuře internetu."

# Advanced flow
flow_heading: "Googleova \"záchranná klapka\" je past"
flow_intro: >-
  Google tvrdí, že "pokročilí uživatelé" budou moci <a href="https://android-developers.googleblog.com/2026/03/android-developer-verification.html" target="_blank">"stále instalovat"</a> neověřené aplikace. Takhle to <i>ve skutečnosti</i> vypadá:
flow_step1: "Prohrabejte se Nastavením systému, najděte Možnosti pro vývojáře"
flow_step2: "Klepněte na číslo sestavení <strong>sedmkrát</strong> pro aktivaci  vývojářského režimu"
flow_step3: "Odmítněte varovné obrazovky o nátlaku"
flow_step4: "Zadejte svůj PIN"
flow_step5: "Restartujte zařízení"
flow_step6: "<strong>Počkejte 24 hodin</strong>"
flow_step7: "Vraťte se, odmítněte další varovné obrazovky"
flow_step8: "Vyberte \"povolit dočasně\" (7 dní) nebo \"povolit trvale\""
flow_step9: "Znovu potvrďte, že chápete \"rizika\""
flow_summary: "Devět kroků. Povinná 24hodinová ochranná lhůta. <em>Pro instalaci softwaru na zařízení, které vlastníte.</em>"
flow_detail: >-
  Ještě horší: celý tento postup probíhá výhradně přes <strong>Google Play Services</strong>, nikoli přes operační systém Android. Google ho může kdykoli změnit, zpřísnit nebo zrušit bez aktualizace OS a bez vašeho souhlasu. A k dnešnímu dni se ještě neobjevil v žádné beta, preview ani canary verzi.  Existuje pouze jako příspěvek na blogu a několik návrhů.

# Precedent
precedent_heading: "Tohle je větší než Android"
precedent_pullquote: "Pokud Google dokáže zpětně uzamknout miliardy zařízení, která byla prodána jako otevřené platformy, sleduje to každý výrobce hardwaru na planetě."
precedent_p1: >-
  Zavádí se princip: <strong>společnost, která vyrobila vaše zařízení, má po jeho zakoupení právo rozhodovat, jaký software na něm smíte spouštět.</strong> V softwaru se tomu říká "rug pull"; tam jste však alespoň vždy měli možnost nainstalovat si konkurenční software. V případě hardwaru se však jedná o hotovou věc (<i>fait accompli</i>), která vás zbavuje možnosti volby a činí vás bezmocnými vůči rozmarům jediného, nikomu se nezodpovídajícího strážce a usvědčeného monopolisty.
precedent_p2: >-
  Otevřenost Androidu nikdy nebyla pouhou funkcí. Byl to <em>slib</em>, který ho odlišoval od iPhonu. Právě z tohoto důvodu si Android vybraly miliony lidí. Google nyní tento slib jednostranně ruší na zařízeních, která už lidé <i>mají</i> v kapse, protože se rozhodl, že má dostatečnou tržní dominanci a regulační vliv, aby mu to prošlo.
precedent_arstechnica: >-
  <a href="https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/" target="_blank">Ars Technica &#8599;</a>: <em>"Závist Googlu vůči Applu hrozí rozbitím tradice otevřeného Androidu."</em>

