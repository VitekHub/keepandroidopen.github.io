# Objections
objections_heading: "Ale počkat, není tohle..."
obj_security_q: "\"...jen o bezpečnosti?\""
obj_security_a: >-
  Bezpečnostní zdůvodnění je kouřová clona. Google Play Protect už malware skenuje nezávisle na identitě vývojáře. Požadavek na úřední doklad totožnosti kód bezpečnější nedělá. Dělá z vývojářů <em>identifikovatelné a ovladatelné</em> osoby. Autoři malwaru se mohou registrovat. Nezávislí vývojáři a disidenti často nemohou. <a href="https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship" target="_blank">EFF to říká naplno &#8599;</a>: bránění na základě identity je nástroj cenzury, nikoli bezpečnosti.
obj_sideloading_q: "\"...stále můžu instalovat ze strany, když použiji pokročilý postup?\""
obj_sideloading_a: >-
  Devět kroků, 24hodinové čekání, schované v Možnostech pro vývojáře, řízené proprietární službou, kterou Google může kdykoli zrušit. To není instalace ze strany. To je <strong>odstrašovací mechanismus</strong> navržený tak, aby ho téměř nikdo nedokončil. A protože běží přes Play Services, nikoli přes OS, může ho Google tiše zpřísnit nebo zrušit.
obj_hide_q: "\"...problém je to jen pro ty, kteří mají co skrývat?\""
obj_hide_a: >-
  Prvními oběťmi budou whistlebloweři, novináři a aktivisté v autoritářských režimech. Další na řadě jsou oběti domácího násilí. Všechny tyto skupiny mají legitimní důvody distribuovat nebo používat software, aniž by musely svou právní identitu ukládat do databáze Googlu. Anonymní příspěvky do open-source projektů jsou tradice starší než Google sám. Tato politika ji na Androidu ukončuje.
obj_apple_q: "\"...nedělá to samé Apple?\""
obj_apple_a: >-
  Apple byl uzavřená zahrada od prvního dne. Lidé si Android vybrali <em>právě proto, že byl jiný</em>. "Apple to dělá taky" je závod ke dnu a slabý argument <i>tu quoque</i>. A pod regulačním tlakem (EU Digital Markets Act) se dokonce Apple musí otevírat. Google jde opačným směrem: snaží se své postavení strážce ještě více upevnit.
obj_cost_q: "\"...jen 25 dolarů a nějaké papírování?\""
obj_cost_a: >-
  Možná, pokud jste vývojář v USA s platební kartou a řidičským průkazem. Zkuste být student v subsaharské Africe, disident v Myanmaru nebo dobrovolník spravující komunitní zdravotnickou aplikaci. Cena není jen finanční: odevzdáváte úřední doklad totožnosti a důkaz o podpisových klíčích společnosti, která <a href="https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/" target="_blank">rutinně vyhovuje &#8599;</a> požadavkům vlád na odstranění aplikací a odhalení vývojářů.

