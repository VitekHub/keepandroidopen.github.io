social_callout_linkedin_3: "Program ověřování vývojářů Googlu by jedné společnosti dal technickou možnost zablokovat jakoukoli aplikaci od jakéhokoli vývojáře na jakémkoli certifikovaném zařízení Android na světě. To ohrožuje nezávislé vývojáře, open-source projekty i princip, že uživatel ovládá software na hardwaru, který vlastní. {url} #KeepAndroidOpen"
social_callout_linkedin_4: "F-Droid odhaduje, že 85 % jeho open-source aplikací bude mít problémy s distribucí kvůli novým pravidlům Googlu. Požadavek na úřední doklad totožnosti a podpisové klíče vytváří bariéry pro anonymní přispěvatele, vývojáře v sankcionovaných zemích i projekty udržované dobrovolníky. {url} #KeepAndroidOpen"
social_callout_linkedin_5: "Googleem navrhovaný \"pokročilý postup\" pro instalaci neověřených aplikací vyžaduje 9 kroků, povinnou 24hodinovou čekací lhůtu a běží výhradně přes Google Play Services. Komunita má přijmout blogový příspěvek jako funkční záruku. Ještě se neobjevil v žádné beta verzi. {url} #KeepAndroidOpen"
social_callout_linkedin_6: "V sázce je digitální suverenita. Plán Googlu zavést povinnou registraci všech vývojářů aplikací pro Android – i těch mimo Obchod Play – vytváří centrální bod kontroly a potenciální cenzury pro 3 miliardy zařízení. {url} #KeepAndroidOpen"
social_callout_linkedin_7: "Kampaň \"Keep Android Open\" získala podporu více než 67 globálních organizací. Odmítáme plán Googlu zablokovat jakoukoli aplikaci, jejíž vývojář se neregistroval centrálně a neposkytl úřední doklad totožnosti. Přečtěte si otevřený dopis: {url} #KeepAndroidOpen"
social_callout_linkedin_8: "Jednostranná změna pravidel u hardwaru, který už lidé vlastní, je nebezpečný precedens. Povinné ověřování vývojářů Googlu odebírá uživatelům možnost rozhodovat a nutí je do řízeného ekosystému. {url} #KeepAndroidOpen"
social_callout_linkedin_9: "F-Droid a EFF bijí na poplach: ověřování vývojářů Googlu je \"existenciální hrozbou\" pro alternativní distribuci aplikací. Musíme chránit open-source ekosystém, který Android postavil. {url} #KeepAndroidOpen"
social_callout_linkedin_10: "Zatímco se Google snaží ještě více upevnit své postavení strážce, komunita se brání. Vaše zařízení by mělo být vaším majetkem, ne pronajatým terminálem s dodatečnými omezeními. Přidejte se k hnutí: {url} #KeepAndroidOpen"
social_callout_bluesky_1: "Od září 2026 Google zablokuje každou aplikaci pro Android, jejíž vývojář se neregistroval a neposkytl úřední doklad totožnosti. Týká se to všech aplikací, nejen z Obchodu Play. F-Droid to nazývá \"existenciální hrozbou\". @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_2: "Google vyžaduje, aby se všichni vývojáři aplikací pro Android centrálně registrovali, zaplatili poplatek a odevzdali úřední doklad totožnosti. Aplikace neregistrovaných vývojářů budou tiše zablokovány. Více než 67 organizací je proti. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_3: "Po 17 letech marketingu Androidu jako otevřené platformy Google zavádí povinnou registraci všech vývojářů. Nezávislí vývojáři, open-source přispěvatelé i alternativní obchody jako F-Droid mají nejistou budoucnost. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_4: "Googleem navrhovaný postup pro instalaci neověřených aplikací: 9 kroků, 24hodinové čekání, řízené přes Play Services (které Google může kdykoli změnit bez souhlasu). Existuje jen jako blogový příspěvek. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_5: "EFF varuje, že ověřování vývojářů Googlu vytváří \"cestu k cenzuře\". Nejvíce postiženi budou vývojáři v represivních zemích, anonymní open-source přispěvatelé a tvůrci nástrojů na ochranu soukromí. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_6: "Plán Googlu zablokovat neověřené aplikace je \"podraz\" na 3 miliardy lidí, kteří si Android vybrali kvůli jeho otevřenosti. Nenechte je proměnit váš telefon v uzavřenou zahradu. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_7: "Vlastnictví znamená kontrolu. Pokud Google může zablokovat jakoukoli aplikaci na vašem telefonu, telefon ve skutečnosti nevlastníte. Přidejte se k více než 100 000 lidí, kteří bojují za otevřený Android. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_8: "Povinná registrace s dokladem totožnosti pro každého vývojáře aplikací? To je sen cenzorů a noční můra pro soukromí. Chraňme otevřený web a otevřený mobil. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_9: "Instalace ze strany by neměla vyžadovat 24hodinovou čekací lhůtu a 9krokovou překážkovou dráhu. Googleův \"pokročilý postup\" je navržen tak, aby selhal. Keep Android Open! @keepandroidopen.bsky.social {url}"
social_callout_bluesky_10: "Od F-Droidu přes nezávislé vývojáře – celý ekosystém Androidu je ohrožen novým nařízením Googlu o povinné registraci. Podívejte se, proč 67+ organizací říká ne: {url}"
social_callout_mastodon_1: "Od září 2026 Google vyžaduje, aby se každý vývojář aplikací pro Android centrálně registroval, poskytl úřední doklad totožnosti a odevzdal podpisové klíče. Aplikace neregistrovaných vývojářů budou zablokovány na všech certifikovaných zařízeních na světě. Ohrožuje to F-Droid, open-source distribuci i uživatelskou svobodu. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_2: "Program ověřování vývojářů Androidu Googlu vyžaduje úřední doklad totožnosti, podpisové klíče a poplatek od každého vývojáře, který chce, aby jeho software byl instalovatelný na Androidu. EFF označuje bránění aplikací za \"cestu k cenzuře\". Více než 67 organizací podepsalo otevřený dopis proti tomu. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_3: "F-Droid, domov tisíců svobodných a open-source aplikací pro Android, označuje ověřování vývojářů Googlu za \"existenciální hrozbu\". Odhaduje se, že 85 % aplikací F-Droidu bude mít problémy s distribucí, protože jejich vývojáři prošli F-Droidem, nikoli Googlem. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_4: "Googleem navrhovaný postup pro sideloading neověřených aplikací vyžaduje 9 kroků, povinnou 24hodinovou čekací lhůtu a běží přes Google Play Services, nikoli přes operační systém Android. Google ho může kdykoli změnit nebo odstranit bez souhlasu uživatele. Ještě se neobjevil v žádné beta verzi. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_5: "Povinná registrace vývojářů, kterou Google zavádí na Androidu, vyvolává obavy u vývojářů v sankcionovaných zemích, anonymních open-source přispěvatelů a tvůrců nástrojů na ochranu soukromí a bezpečnost. Google má prokázanou historii vyhovování požadavkům vlád na odstranění aplikací. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_6: "Síla Androidu spočívala v jeho decentralizovanosti. Plán Googlu zavést centrální registraci pro každého vývojáře aplikací ji ničí. Musíme se této centralizaci moci postavit. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_7: "Když jste si koupili hardware, měli byste mít poslední slovo ohledně softwaru. Plán Googlu zablokovat neověřené aplikace je přímý útok na uživatelskou suverenitu. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_8: "Představte si svět, kde každý malý hobby vývojář nebo dobrovolník musí registrovat u globální korporace, jen aby mohl sdílet svou práci. To je svět, který Google v roce 2026 buduje pro Android. {url} @keepandroidopen@techhub.social"
social_callout_mastodon_9: "Googleův \"pokročilý postup\" pro sideloading je odstrašovací mechanismus, nikoli záchranná klapka. 9 kroků a 24 hodin čekání na software, který vlastníte? Ne, díky. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_10: "Více než 100 000 lidí a 67+ organizací se postavilo proti pokusu Googlu uzamknout Android. Přidejte se k boji za skutečně otevřený mobilní ekosystém. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_facebook_1: "Od září 2026 Google vyžaduje, aby se každý vývojář aplikací pro Android centrálně registroval a poskytl úřední doklad totožnosti. Aplikace neregistrovaných vývojářů budou zablokovány na všech certifikovaných zařízeních Android na světě. Týká se to všech aplikací, nejen těch z Obchodu Play. Více zde: {url}"
social_callout_facebook_2: "F-Droid, open-source obchod s aplikacemi pro Android používaný miliony lidí, označuje ověřování vývojářů Googlu za \"existenciální hrozbu\" pro své další fungování. Více než 67 organizací včetně EFF, FSF a Tor Project podepsalo otevřený dopis proti této politice. Zjistěte, proč na tom záleží: {url}"
social_callout_facebook_3: "Googleem navrhovaný postup pro instalaci neověřených aplikací po zavedení uzamčení vyžaduje 9 kroků, povinnou 24hodinovou čekací lhůtu a běží přes Google Play Services (které Google může kdykoli změnit). Komunita má přijmout blogový příspěvek jako záruku. {url}"
social_callout_facebook_4: "Otevřenost byla 17 let hlavní charakteristikou Androidu. Miliony lidí si ho vybraly právě proto. Google nyní zavádí povinnou registraci všech vývojářů aplikací, včetně těch distribuovaných mimo Obchod Play. Nejvíce postiženi budou nezávislí vývojáři a open-source projekty. {url}"
social_callout_facebook_5: "EFF označuje bránění aplikací za \"cestu k cenzuře\". Program ověřování vývojářů Googlu by jedné společnosti dal možnost zablokovat jakoukoli aplikaci od jakéhokoli vývojáře na jakémkoli certifikovaném zařízení na světě. Tím se vytváří precedens, který přesahuje Android a týká se budoucnosti osobního počítání. {url}"
social_callout_facebook_6: "Váš telefon, vaše volba? Ne, pokud si Google prosadí své. Od roku 2026 plánují zablokovat jakoukoli aplikaci, jejíž vývojář se neregistroval a neposkytl úřední doklad totožnosti. To se týká úplně všech. {url}"
social_callout_facebook_7: "Google zpětně uzamyká miliardy zařízení, která byla prodána jako otevřené platformy. Tento \"podraz\" ohrožuje nezávislé vývojáře a alternativní obchody jako F-Droid. {url}"
social_callout_facebook_8: "Je váš telefon skutečně váš? Pokud Google rozhoduje, které aplikace smíte nainstalovat, odpověď zní ne. Přidejte se k více než 100 000 lidí, kteří bojují za otevřený Android. {url}"
social_callout_facebook_9: "9krokový proces Googlu pro \"povolení\" neověřených aplikací je past. Je navržen tak, aby byl tak obtížný, že ho nikdo nepoužije, a Google tak získá úplnou kontrolu. {url}"
social_callout_facebook_10: "Od studentů, kteří tvoří své první aplikace, až po dobrovolníky vytvářející nástroje na ochranu soukromí – povinná registrační politika Googlu zastaví inovace. Pomozte nám udržet Android otevřený! {url}"

